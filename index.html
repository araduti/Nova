<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmpCloud — Task Sequence Dashboard</title>
    <style>
        /* ── Reset & base ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #1a1a2e;
            --surface:      #16213e;
            --surface-alt:  #1a2744;
            --border:       #2a3a5c;
            --text:         #e0e0e0;
            --text-muted:   #7b8da6;
            --accent:       #0f7ae5;
            --accent-hover: #339af0;
            --accent-glow:  rgba(15, 122, 229, 0.25);
            --danger:       #e03e3e;
            --success:      #2b8a3e;
            --warning:      #f59f00;
            --header-h:     56px;
            --font:         'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono:         'Cascadia Code', 'Consolas', monospace;
            --radius:       6px;
            --radius-lg:    10px;
            --shadow-sm:    0 1px 3px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg:    0 8px 32px rgba(0,0,0,0.5);
            --transition:   0.15s ease;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
        }

        /* ── Header ─────────────────────────────────────────────────── */
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-h);
            padding: 0 28px;
            background: linear-gradient(135deg, #0d1b3e 0%, #162447 100%);
            border-bottom: 1px solid var(--border);
            user-select: none;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .dash-header-left { display: flex; align-items: center; gap: 12px; }
        .dash-header-right { display: flex; align-items: center; gap: 12px; }
        .dash-logo {
            font-weight: 700;
            font-size: 17px;
            color: #fff;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dash-logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--accent) 0%, #5c7cfa 100%);
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
        }
        .dash-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .dash-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text);
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .dash-btn:hover { background: var(--border); color: #fff; }
        .dash-btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .dash-btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        /* ── Main content ───────────────────────────────────────────── */
        .dash-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 28px;
        }
        .dash-section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dash-section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ── Card grid ──────────────────────────────────────────────── */
        .ts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .ts-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .ts-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), var(--shadow-lg);
            transform: translateY(-2px);
        }
        .ts-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #5c7cfa);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .ts-card:hover::before { opacity: 1; }
        .ts-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .ts-card-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
        }
        .ts-card-version {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .ts-card-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .ts-card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .ts-card-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ts-card-stat-icon {
            font-size: 14px;
            opacity: 0.7;
        }
        .ts-card-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .ts-mini-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            color: #fff;
        }
        .ts-mini-badge.disabled {
            opacity: 0.3;
        }
        .ts-mini-badge[data-type="PartitionDisk"]   { background: #e67700; }
        .ts-mini-badge[data-type="DownloadImage"]   { background: #1971c2; }
        .ts-mini-badge[data-type="ApplyImage"]      { background: #2f9e44; }
        .ts-mini-badge[data-type="SetBootloader"]   { background: #7048e8; }
        .ts-mini-badge[data-type="InjectDrivers"]   { background: #c2255c; }
        .ts-mini-badge[data-type="InjectOemDrivers"]{ background: #e8590c; }
        .ts-mini-badge[data-type="ApplyAutopilot"]  { background: #0c8599; }
        .ts-mini-badge[data-type="StageCCMSetup"]   { background: #5f3dc4; }
        .ts-mini-badge[data-type="CustomizeOOBE"]   { background: #d6336c; }
        .ts-mini-badge[data-type="RunPostScripts"]  { background: #5c940d; }
        .ts-mini-badge[data-type="SetComputerName"] { background: var(--accent); }
        .ts-mini-badge[data-type="SetRegionalSettings"] { background: var(--accent); }
        .ts-mini-badge[data-type="ImportAutopilot"] { background: var(--accent); }
        .ts-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .ts-card-action {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-muted);
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
        }
        .ts-card-action:hover { color: #fff; border-color: var(--accent); background: var(--accent-glow); }
        .ts-card-action.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
        .ts-card-action.primary:hover { background: var(--accent-hover); }

        /* ── Create new card ────────────────────────────────────────── */
        .ts-card-new {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            border-style: dashed;
            background: transparent;
        }
        .ts-card-new:hover {
            background: var(--surface);
        }
        .ts-card-new-icon {
            font-size: 36px;
            color: var(--text-muted);
            margin-bottom: 10px;
            transition: color var(--transition);
        }
        .ts-card-new:hover .ts-card-new-icon { color: var(--accent); }
        .ts-card-new-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }
        .ts-card-new-hint {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 4px;
        }

        /* ── Empty state ────────────────────────────────────────────── */
        .dash-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .dash-empty-icon {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .dash-empty p {
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ── Loading skeleton ───────────────────────────────────────── */
        .ts-card-skeleton {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            min-height: 200px;
        }
        .skeleton-line {
            background: linear-gradient(90deg, var(--surface-alt) 25%, rgba(255,255,255,0.05) 50%, var(--surface-alt) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .skeleton-line.w60 { width: 60%; height: 18px; }
        .skeleton-line.w80 { width: 80%; height: 14px; }
        .skeleton-line.w40 { width: 40%; height: 14px; }
        .skeleton-badges { display: flex; gap: 4px; margin-top: 16px; }
        .skeleton-badge {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--surface-alt) 25%, rgba(255,255,255,0.05) 50%, var(--surface-alt) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* ── Scrollbar ─────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        ::selection { background: var(--accent); color: #fff; }

        /* ── Hidden file input ──────────────────────────────────────── */
        #fileInput { display: none; }

        /* ── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 480px) {
            .ts-grid { grid-template-columns: 1fr; }
            .dash-content { padding: 20px 16px; }
            .dash-header { padding: 0 16px; }
        }
    </style>
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header class="dash-header">
        <div class="dash-header-left">
            <span class="dash-logo">
                <span class="dash-logo-icon">&#9729;</span>
                AmpCloud
            </span>
            <span class="dash-subtitle">Task Sequence Dashboard</span>
        </div>
        <div class="dash-header-right">
            <button class="dash-btn" onclick="document.getElementById('fileInput').click();" title="Import a task sequence JSON file">
                &#128194; Import
            </button>
            <button class="dash-btn dash-btn-primary" onclick="openEditor()" title="Create a new task sequence">
                &#43; New
            </button>
        </div>
    </header>

    <!-- ── Main content ────────────────────────────────────────────── -->
    <main class="dash-content">
        <div class="dash-section-title">Task Sequences</div>
        <div id="tsGrid" class="ts-grid">
            <!-- Loading skeleton -->
            <div class="ts-card-skeleton" id="loadingSkeleton">
                <div class="skeleton-line w60"></div>
                <div class="skeleton-line w80"></div>
                <div class="skeleton-line w40"></div>
                <div class="skeleton-badges">
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                </div>
            </div>
        </div>

        <div id="recentSection" style="display:none;">
            <div class="dash-section-title">Recently Opened</div>
            <div id="recentGrid" class="ts-grid"></div>
        </div>
    </main>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json">

    <script>
    'use strict';

    const BADGE_LABELS = {
        PartitionDisk: 'P', DownloadImage: 'D', ApplyImage: 'A', SetBootloader: 'B',
        InjectDrivers: 'I', InjectOemDrivers: 'O', ApplyAutopilot: 'AP',
        StageCCMSetup: 'S', CustomizeOOBE: 'C', RunPostScripts: 'R',
        SetComputerName: '?', SetRegionalSettings: '?', ImportAutopilot: '?'
    };

    function escapeHtml(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
    }

    /** Build a task sequence card element. */
    function createTsCard(ts, source, storageKey) {
        var totalSteps = ts.steps ? ts.steps.length : 0;
        var enabledSteps = ts.steps ? ts.steps.filter(function (s) { return s.enabled !== false; }).length : 0;
        var disabledSteps = totalSteps - enabledSteps;

        var card = document.createElement('div');
        card.className = 'ts-card';

        /* Card header */
        var headerHtml = '<div class="ts-card-header">' +
            '<div class="ts-card-name">' + escapeHtml(ts.name || 'Untitled Task Sequence') + '</div>' +
            (ts.version ? '<span class="ts-card-version">v' + escapeHtml(ts.version) + '</span>' : '') +
            '</div>';

        /* Description */
        var descHtml = '<div class="ts-card-desc">' + escapeHtml(ts.description || 'No description') + '</div>';

        /* Meta stats */
        var metaHtml = '<div class="ts-card-meta">' +
            '<span class="ts-card-stat"><span class="ts-card-stat-icon">&#128203;</span> ' + totalSteps + ' step' + (totalSteps !== 1 ? 's' : '') + '</span>' +
            '<span class="ts-card-stat"><span class="ts-card-stat-icon">&#9989;</span> ' + enabledSteps + ' enabled</span>' +
            (disabledSteps > 0 ? '<span class="ts-card-stat"><span class="ts-card-stat-icon">&#10060;</span> ' + disabledSteps + ' disabled</span>' : '') +
            '</div>';

        /* Mini badges */
        var badgesHtml = '<div class="ts-card-badges">';
        if (ts.steps) {
            ts.steps.forEach(function (step) {
                var label = BADGE_LABELS[step.type] || '?';
                var cls = step.enabled === false ? ' disabled' : '';
                badgesHtml += '<span class="ts-mini-badge' + cls + '" data-type="' + escapeHtml(step.type) + '" title="' + escapeHtml(step.name) + '">' + label + '</span>';
            });
        }
        badgesHtml += '</div>';

        /* Actions */
        var actionsHtml = '<div class="ts-card-actions">' +
            '<button class="ts-card-action primary" data-action="open">&#9998; Open in Editor</button>' +
            '<button class="ts-card-action" data-action="download">&#11015; Download</button>' +
            '<button class="ts-card-action" data-action="duplicate">&#128203; Duplicate</button>' +
            (storageKey ? '<button class="ts-card-action" data-action="remove" title="Remove from recently opened">&#128465; Remove</button>' : '') +
            '</div>';

        card.innerHTML = headerHtml + descHtml + metaHtml + badgesHtml + actionsHtml;

        /* Click on card body opens editor */
        card.addEventListener('click', function (e) {
            if (e.target.closest('.ts-card-actions')) return;
            openEditor(source);
        });

        /* Action buttons */
        card.querySelectorAll('[data-action]').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var action = btn.getAttribute('data-action');
                if (action === 'open') {
                    openEditor(source);
                } else if (action === 'download') {
                    downloadTs(ts);
                } else if (action === 'duplicate') {
                    duplicateTs(ts);
                } else if (action === 'remove' && storageKey) {
                    removeRecent(storageKey);
                }
            });
        });

        return card;
    }

    /** Create the "New Task Sequence" card. */
    function createNewCard() {
        var card = document.createElement('div');
        card.className = 'ts-card ts-card-new';
        card.innerHTML =
            '<div class="ts-card-new-icon">&#43;</div>' +
            '<div class="ts-card-new-label">Create New Task Sequence</div>' +
            '<div class="ts-card-new-hint">Start from scratch or import a JSON file</div>';
        card.addEventListener('click', function () { openEditor(); });
        return card;
    }

    /** Navigate to the Editor. */
    function openEditor(source) {
        if (source) {
            window.location.href = 'Editor/index.html?ts=' + encodeURIComponent(source);
        } else {
            window.location.href = 'Editor/index.html?new=1';
        }
    }

    /** Download a task sequence as JSON. */
    function downloadTs(ts) {
        var json = JSON.stringify(ts, null, 2);
        var blob = new Blob([json], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        var safeName = (ts.name || 'tasksequence').replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 60);
        a.download = safeName + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    /** Duplicate a task sequence into recently opened. */
    function duplicateTs(ts) {
        var copy = JSON.parse(JSON.stringify(ts));
        copy.name = (copy.name || 'Task Sequence') + ' (Copy)';
        saveToRecent(copy);
        loadRecentSequences();
    }

    /** Save a task sequence to localStorage recent list. */
    function saveToRecent(ts) {
        var recents = JSON.parse(localStorage.getItem('ampcloud_recent_ts') || '[]');
        var key = 'ts_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        recents.unshift({ key: key, data: ts, timestamp: Date.now() });
        /* Keep only the last 10 */
        if (recents.length > 10) recents = recents.slice(0, 10);
        localStorage.setItem('ampcloud_recent_ts', JSON.stringify(recents));
        /* Also store the actual data for editor retrieval */
        sessionStorage.setItem(key, JSON.stringify(ts));
        return key;
    }

    /** Remove a recently opened task sequence. */
    function removeRecent(key) {
        var recents = JSON.parse(localStorage.getItem('ampcloud_recent_ts') || '[]');
        recents = recents.filter(function (r) { return r.key !== key; });
        localStorage.setItem('ampcloud_recent_ts', JSON.stringify(recents));
        sessionStorage.removeItem(key);
        loadRecentSequences();
    }

    /** Load and display recently opened task sequences. */
    function loadRecentSequences() {
        var recents = JSON.parse(localStorage.getItem('ampcloud_recent_ts') || '[]');
        var section = document.getElementById('recentSection');
        var grid = document.getElementById('recentGrid');

        if (recents.length === 0) {
            section.style.display = 'none';
            return;
        }

        section.style.display = '';
        grid.innerHTML = '';
        recents.forEach(function (entry) {
            if (entry.data) {
                /* Store data in sessionStorage so editor can load it */
                sessionStorage.setItem(entry.key, JSON.stringify(entry.data));
                var card = createTsCard(entry.data, 'session:' + entry.key, entry.key);
                grid.appendChild(card);
            }
        });
    }

    /** Load the default task sequence and display. */
    function loadDashboard() {
        var grid = document.getElementById('tsGrid');
        var skeleton = document.getElementById('loadingSkeleton');

        fetch('TaskSequence/default.json')
            .then(function (r) {
                if (!r.ok) throw new Error(r.statusText);
                return r.json();
            })
            .then(function (ts) {
                if (skeleton) skeleton.remove();
                var card = createTsCard(ts, 'default', null);
                grid.insertBefore(card, grid.firstChild);
                grid.appendChild(createNewCard());
            })
            .catch(function () {
                if (skeleton) skeleton.remove();
                grid.appendChild(createNewCard());
            });

        loadRecentSequences();
    }

    /* ── Import handler ─────────────────────────────────────────────── */
    document.getElementById('fileInput').addEventListener('change', function (e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (ev) {
            try {
                var data = JSON.parse(ev.target.result);
                if (!data.steps || !Array.isArray(data.steps)) throw new Error('Invalid task sequence: missing steps array');
                var key = saveToRecent(data);
                openEditor('session:' + key);
            } catch (err) {
                alert('Failed to import task sequence:\n' + err.message);
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    });

    /* ── Init ───────────────────────────────────────────────────────── */
    loadDashboard();
    </script>
</body>
</html>
