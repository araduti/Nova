<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https://login.microsoftonline.com; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'">
    <title>Nova — Task Sequence Dashboard</title>
    <link rel="stylesheet" href="src/web/auth/login.css">
    <link rel="stylesheet" href="src/web/dashboard/css/dashboard.css">
    <style>body.auth-pending > *:not(.login-overlay) { display: none !important; }</style>
</head>
<body class="auth-pending">

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header class="dash-header">
        <div class="dash-header-left">
            <span class="dash-logo">
                <span class="dash-logo-icon">&#9729;</span>
                Nova
            </span>
            <span class="dash-subtitle">Task Sequence Dashboard</span>
        </div>
        <div class="dash-header-right">
            <a href="src/web/monitoring/" class="dash-btn" title="View deployment monitoring dashboard">
                &#128200; Monitoring
            </a>
            <button id="btnImport" class="dash-btn" title="Import a task sequence JSON file">
                &#128194; Import
            </button>
            <button id="btnNew" class="dash-btn dash-btn-primary" title="Create a new task sequence">
                &#43; New
            </button>
        </div>
    </header>

    <!-- ── Main content ────────────────────────────────────────────── -->
    <main class="dash-content">
        <div class="dash-section-title">Task Sequences</div>
        <div id="tsGrid" class="ts-grid">
            <!-- Loading skeleton -->
            <div class="ts-card-skeleton" id="loadingSkeleton">
                <div class="skeleton-line w60"></div>
                <div class="skeleton-line w80"></div>
                <div class="skeleton-line w40"></div>
                <div class="skeleton-badges">
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                </div>
            </div>
        </div>

        <div id="recentSection" class="hidden">
            <div class="dash-section-title">Recently Opened</div>
            <div id="recentGrid" class="ts-grid"></div>
        </div>
    </main>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json">

    <script src="src/web/auth/msal-browser.min.js"></script>
    <script src="src/web/auth/gate.js"></script>
    <script type="module" src="src/web/dashboard/js/dashboard.js"></script>
</body>
</html>
