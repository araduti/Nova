<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        /* ── Reset & base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-top:       #dae8fc;
            --bg-bottom:    #eaf0fa;
            --bg-dark-top:  #1a1a2e;
            --bg-dark-bot:  #16213e;
            --card:         #ffffff;
            --card-dark:    rgba(22, 33, 62, 0.92);
            --card-shadow:  rgba(0, 0, 0, 0.08);
            --accent:       #0f7ae5;
            --accent-glow:  rgba(15, 122, 229, 0.25);
            --text:         #1a1a2e;
            --text-dark:    #e0e0e0;
            --text-muted:   #7b8da6;
            --border:       #2a3a5c;
            --success:      #107c10;
            --radius:       16px;
            --font:         'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            overflow: hidden;
            user-select: none;
        }

        /* ── Gradient backdrop ─────────────────────────────────────── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.4s ease;
        }
        .backdrop.dark {
            background: linear-gradient(180deg, var(--bg-dark-top) 0%, var(--bg-dark-bot) 100%);
        }

        /* ── Card ──────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px 52px 40px;
            width: 520px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 8px 40px var(--card-shadow), 0 0 0 1px rgba(0,0,0,0.04);
            position: relative;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        .dark .card {
            background: var(--card-dark);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        /* ── Logo ──────────────────────────────────────────────────── */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 32px;
        }
        .logo img {
            height: 48px;
            width: auto;
        }



        /* ── Spinner ring ──────────────────────────────────────────── */
        .spinner-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(15, 122, 229, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner.done {
            animation: none;
            border-color: var(--success);
            border-top-color: var(--success);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Step indicators (Autopilot-style) ─────────────────────── */
        .steps {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 0;
            margin-bottom: 28px;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 80px;
        }
        .step-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease, background 0.3s ease;
            background: transparent;
        }
        .step-icon svg { width: 14px; height: 14px; display: none; }
        .dark .step-icon { border-color: #3a3a4e; }
        .step.active .step-icon {
            border-color: var(--accent);
            background: rgba(15, 122, 229, 0.08);
        }
        .step.completed .step-icon {
            border-color: var(--success);
            background: var(--success);
        }
        .step.completed .step-icon svg { display: block; }
        .step-label {
            font-size: 11px;
            color: #999;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .step.active .step-label { color: var(--accent); font-weight: 600; }
        .step.completed .step-label { color: var(--success); }
        .dark .step-label { color: var(--text-muted); }
        .dark .step.active .step-label { color: var(--accent); }
        .dark .step.completed .step-label { color: var(--success); }
        .step-line {
            width: 32px;
            height: 2px;
            background: #ddd;
            margin: 0 4px;
            margin-top: 13px; /* centre with step-icon (28px + 2px border) / 2 - line height */
            flex-shrink: 0;
            transition: background 0.3s ease;
        }
        .dark .step-line { background: #2a3a5c; }
        .step-line.completed { background: var(--success); }

        /* ── Status message ────────────────────────────────────────── */
        .status {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            min-height: 24px;
            transition: color 0.3s ease;
        }
        .dark .status { color: var(--text-dark); }

        /* ── Progress bar ──────────────────────────────────────────── */
        .progress-container {
            margin-top: 16px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .dark .progress-bar { background: rgba(255, 255, 255, 0.08); }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #5c7cfa);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ── Detail text ───────────────────────────────────────────── */
        .detail {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            min-height: 18px;
        }

        /* ── Bottom labels ─────────────────────────────────────────── */
        .hint {
            position: fixed;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.25);
            transition: color 0.4s ease;
            bottom: 12px;
            left: 16px;
        }
        .dark .hint { color: rgba(255, 255, 255, 0.15); }
        .company-logo {
            position: fixed;
            bottom: 12px;
            right: 16px;
            height: 28px;
            width: auto;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }
        .company-logo:hover { opacity: 0.6; }

        /* ── Fade-in ───────────────────────────────────────────────── */
        body { opacity: 0; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>

    <script>
        /* ── HTML Progress UI ─────────────────────────────────────────
         *  Polls X:\Nova-Status.json (written by Bootstrap.ps1 and
         *  Nova.ps1) and updates the on-screen progress display.
         *  Runs inside Edge in --app / --kiosk mode on WinPE.
         * ──────────────────────────────────────────────────────────── */

        var STATUS_PATH = 'file:///X:/Nova-Status.json';
        var POLL_MS     = 650;
        var lastStep    = 0;

        var elStatus    = document.getElementById('status');
        var elDetail    = document.getElementById('detail');
        var elProgress  = document.getElementById('progressContainer');
        var elFill      = document.getElementById('progressFill');
        var elText      = document.getElementById('progressText');
        var elSpinner   = document.getElementById('spinner');
        var steps       = document.querySelectorAll('#steps .step');
        var lines       = [document.getElementById('line1'),
                           document.getElementById('line2'),
                           document.getElementById('line3')];

        function updateUI(data) {
            if (!data) return;

            /* Status message */
            if (data.Message) {
                elStatus.textContent = data.Message;
            }

            /* Step indicator (1-4) */
            if (data.Step > 0 && data.Step !== lastStep) {
                lastStep = data.Step;
                steps.forEach(function (s, i) {
                    var n = i + 1;
                    s.classList.remove('active', 'completed');
                    if (n < data.Step)      s.classList.add('completed');
                    else if (n === data.Step) s.classList.add('active');
                });
                lines.forEach(function (l, i) {
                    if (i < data.Step - 1) l.classList.add('completed');
                    else                   l.classList.remove('completed');
                });
            }

            /* Progress bar */
            if (data.Progress > 0) {
                elProgress.style.display = 'block';
                elFill.style.width = Math.min(data.Progress, 100) + '%';
                var detail = data.Detail || data.Message || '';
                elText.textContent = detail + '  \u2022  ' + data.Progress + '%';
            } else {
                elProgress.style.display = 'none';
            }

            /* Detail line (shown below status when no progress bar) */
            if (data.Detail && data.Progress <= 0) {
                elDetail.textContent = data.Detail;
            } else if (!data.Detail) {
                elDetail.textContent = '';
            }

            /* Done flag */
            if (data.Done) {
                elSpinner.classList.add('done');
            }
        }

        /* Poll the status JSON written by PowerShell scripts */
        function pollStatus() {
            var xhr = new XMLHttpRequest();
            xhr.onload = function () {
                try {
                    if (xhr.responseText && xhr.responseText.trim()) {
                        var data = JSON.parse(xhr.responseText);
                        updateUI(data);
                    }
                } catch (e) { /* parse error — ignore */ }
            };
            /* onerror is expected when the file does not yet exist */
            xhr.onerror = function () {};
            try {
                xhr.open('GET', STATUS_PATH, true);
                xhr.send();
            } catch (e) { /* ignore */ }
        }

        setInterval(pollStatus, POLL_MS);
    </script>
