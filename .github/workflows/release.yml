name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Editor tests
        run: npm test

      - name: Build web assets
        run: npm run build

      - name: Install OAuth proxy dependencies
        working-directory: oauth-proxy
        run: npm ci

      - name: Run OAuth proxy tests
        working-directory: oauth-proxy
        run: npm test

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/powershell'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  check-signing:
    name: Check Signing Availability
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if [ -n "$AZURE_TENANT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  sign-scripts:
    name: Sign PowerShell Scripts
    if: needs.check-signing.outputs.available == 'true'
    needs: [check-signing, test]
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install TrustedSigning module
        shell: pwsh
        run: |
          Install-Module -Name TrustedSigning -RequiredVersion 0.5.8 -Force -Scope CurrentUser -Repository PSGallery

      - name: Sign PowerShell scripts and modules
        shell: pwsh
        env:
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse |
            Where-Object { $_.FullName -notmatch '[/\\]tests[/\\]' }

          foreach ($file in $scripts) {
            Write-Host "Signing: $($file.FullName)"
            Invoke-TrustedSigning `
              -Endpoint $env:TRUSTED_SIGNING_ENDPOINT `
              -CodeSigningAccountName $env:TRUSTED_SIGNING_ACCOUNT `
              -CertificateProfileName $env:TRUSTED_SIGNING_PROFILE `
              -Files $file.FullName `
              -FileDigest SHA256 `
              -TimestampRfc3161 "http://timestamp.acs.microsoft.com" `
              -TimestampDigest SHA256

            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "Signature verification failed for $($file.FullName): $($sig.Status)"
              exit 1
            }
            Write-Host "  Signature valid ($($sig.SignerCertificate.Subject))"
          }
          Write-Host "`nAll scripts signed and verified successfully."

      - name: Regenerate hashes for signed files
        shell: pwsh
        run: |
          $manifest = Get-Content 'config/hashes.json' -Raw | ConvertFrom-Json
          foreach ($entry in $manifest.files.PSObject.Properties) {
            if (Test-Path $entry.Name) {
              $hash = (Get-FileHash -Path $entry.Name -Algorithm SHA256).Hash
              $manifest.files.($entry.Name) = $hash
            }
          }
          $manifest.generated = (Get-Date -Format 'yyyy-MM-dd')
          $manifest | ConvertTo-Json -Depth 5 | Set-Content 'config/hashes.json' -NoNewline
          Write-Host "Hashes regenerated for signed files."

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-scripts
          path: |
            src/scripts/
            src/modules/
            resources/autopilot/
            config/hashes.json

  create-release:
    name: Create GitHub Release
    needs: sign-scripts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download signed scripts
        uses: actions/download-artifact@v8
        with:
          name: signed-scripts
          path: signed/

      - name: Package signed scripts
        run: |
          cd signed
          zip -r ../nova-signed-scripts.zip .

      - name: Extract release notes
        id: notes
        run: |
          # Extract the first version section from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1; next} found' docs/CHANGELOG.md > /tmp/release-notes.md
          echo "Release notes extracted"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: nova-signed-scripts.zip
