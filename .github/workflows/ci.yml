name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test-proxy:
    name: OAuth Proxy — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: oauth-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  lint-powershell:
    name: PowerShell — PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = @()
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse
          foreach ($script in $scripts) {
            $results += Invoke-ScriptAnalyzer -Path $script.FullName -Severity Warning,Error -ExcludeRule PSAvoidUsingWriteHost
          }
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: all scripts passed."

  build-web:
    name: Web UI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Editor tests
        run: npm test

      - name: Build
        run: npm run build
