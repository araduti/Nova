name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test-proxy:
    name: OAuth Proxy — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: oauth-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  lint-powershell:
    name: PowerShell — PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = @()
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse
          foreach ($script in $scripts) {
            $results += Invoke-ScriptAnalyzer -Path $script.FullName -Severity Warning,Error -ExcludeRule PSAvoidUsingWriteHost
          }
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: all scripts passed."

  test-powershell:
    name: PowerShell — Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/powershell'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $config

  validate-hashes:
    name: Integrity — Validate Hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Config/hashes.json
        shell: pwsh
        run: |
          $manifest = Get-Content 'config/hashes.json' -Raw | ConvertFrom-Json
          $failed = @()
          foreach ($entry in $manifest.files.PSObject.Properties) {
            $file = $entry.Name
            $expected = $entry.Value
            if (-not (Test-Path $file)) {
              Write-Warning "File not found: $file"
              $failed += $file
              continue
            }
            $actual = (Get-FileHash -Path $file -Algorithm SHA256).Hash
            if ($actual -ne $expected) {
              Write-Host "MISMATCH $file" -ForegroundColor Red
              Write-Host "  Expected: $expected"
              Write-Host "  Actual:   $actual"
              $failed += $file
            } else {
              Write-Host "OK $file" -ForegroundColor Green
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "Hash validation failed for $($failed.Count) file(s): $($failed -join ', '). Run the hash regeneration script to update Config/hashes.json."
            exit 1
          }
          Write-Host "`nAll hashes validated successfully."

  build-web:
    name: Web UI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Editor tests
        run: npm test

      - name: Build
        run: npm run build

  test-e2e:
    name: Editor — Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  sign-scripts:
    name: Code Signing — Azure Trusted Signing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-powershell, test-powershell, validate-hashes]
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install TrustedSigning module
        shell: pwsh
        run: |
          Install-Module -Name TrustedSigning -RequiredVersion 0.4.1 -Force -Scope CurrentUser -Repository PSGallery

      - name: Sign PowerShell scripts and modules
        shell: pwsh
        env:
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse |
            Where-Object { $_.FullName -notmatch '[/\\]tests[/\\]' }

          foreach ($file in $scripts) {
            Write-Host "Signing: $($file.FullName)"
            Invoke-TrustedSigning `
              -Endpoint $env:TRUSTED_SIGNING_ENDPOINT `
              -AccountName $env:TRUSTED_SIGNING_ACCOUNT `
              -CertificateProfileName $env:TRUSTED_SIGNING_PROFILE `
              -Files $file.FullName `
              -FileDigest SHA256 `
              -TimestampRfc3161 "http://timestamp.acs.microsoft.com" `
              -TimestampDigest SHA256

            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "Signature verification failed for $($file.FullName): $($sig.Status)"
              exit 1
            }
            Write-Host "  Signature valid ($($sig.SignerCertificate.Subject))"
          }
          Write-Host "`nAll scripts signed and verified successfully."

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-scripts
          path: |
            src/scripts/
            src/modules/
            resources/autopilot/
          retention-days: 7
