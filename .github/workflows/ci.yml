name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test-proxy:
    name: OAuth Proxy — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: oauth-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  lint-powershell:
    name: PowerShell — PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = @()
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse
          foreach ($script in $scripts) {
            $results += Invoke-ScriptAnalyzer -Path $script.FullName -Severity Warning,Error -ExcludeRule PSAvoidUsingWriteHost,PSUseBOMForUnicodeEncodedFile
          }
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: all scripts passed."

  test-powershell:
    name: PowerShell — Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/powershell'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $config

  validate-modules:
    name: PowerShell — Module Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate module manifests
        shell: pwsh
        run: |
          $env:PSModulePath = "src/modules" + [IO.Path]::PathSeparator + $env:PSModulePath
          $failed = @()
          foreach ($dir in (Get-ChildItem src/modules -Directory)) {
              $psd1 = Join-Path $dir.FullName "$($dir.Name).psd1"
              try {
                  $null = Test-ModuleManifest -Path $psd1 -ErrorAction Stop -WarningAction SilentlyContinue
                  Write-Host "OK: $($dir.Name)"
              } catch {
                  Write-Host "FAIL: $($dir.Name) -> $_"
                  $failed += $dir.Name
              }
          }
          if ($failed.Count -gt 0) {
              Write-Error "Module manifest validation failed for: $($failed -join ', ')"
              exit 1
          }
          Write-Host "`nAll module manifests validated successfully."

      - name: Check for duplicate GUIDs
        shell: pwsh
        run: |
          $guids = @{}
          foreach ($dir in (Get-ChildItem src/modules -Directory)) {
              $psd1 = Join-Path $dir.FullName "$($dir.Name).psd1"
              $data = Import-PowerShellDataFile $psd1
              $guid = $data.GUID
              if ($guids.ContainsKey($guid)) {
                  Write-Error "Duplicate GUID '$guid' in $($dir.Name) and $($guids[$guid])"
                  exit 1
              }
              $guids[$guid] = $dir.Name
          }
          Write-Host "All $($guids.Count) module GUIDs are unique."

      - name: Check UTF-8 BOM on module files
        shell: pwsh
        run: |
          $failed = @()
          foreach ($file in (Get-ChildItem src/modules -Include '*.psm1','*.psd1' -Recurse)) {
              $bytes = [System.IO.File]::ReadAllBytes($file.FullName)
              if ($bytes.Length -lt 3 -or $bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
                  Write-Host "NO BOM: $($file.FullName)"
                  $failed += $file.FullName
              }
          }
          if ($failed.Count -gt 0) {
              Write-Error "UTF-8 BOM missing on $($failed.Count) file(s). PS 5.1 requires BOM for correct encoding."
              exit 1
          }
          Write-Host "All module files have UTF-8 BOM."

      - name: Check for en-dash and em-dash characters
        shell: pwsh
        run: |
          $issues = @()
          foreach ($file in (Get-ChildItem src/modules -Include '*.psm1','*.psd1' -Recurse)) {
              $lines = Get-Content $file.FullName
              for ($i = 0; $i -lt $lines.Count; $i++) {
                  if ($lines[$i] -match '[\u2013\u2014]') {
                      $issues += "$($file.Name):$($i + 1): $($lines[$i].Trim())"
                  }
              }
          }
          if ($issues.Count -gt 0) {
              Write-Host "En-dash/em-dash found in module files:"
              $issues | ForEach-Object { Write-Host "  $_" }
              Write-Error "Replace en-dash (U+2013) and em-dash (U+2014) with -- to prevent PS 5.1 encoding issues."
              exit 1
          }
          Write-Host "No en-dash or em-dash characters found in module files."

  regenerate-hashes:
    name: Integrity — Regenerate Hashes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Regenerate config/hashes.json
        shell: pwsh
        run: |
          $manifest = Get-Content 'config/hashes.json' -Raw | ConvertFrom-Json
          $changed = $false
          $missing = @()
          foreach ($entry in $manifest.files.PSObject.Properties) {
            $file = $entry.Name
            if (-not (Test-Path $file)) {
              Write-Warning "File not found: $file"
              $missing += $file
              continue
            }
            $hash = (Get-FileHash -Path $file -Algorithm SHA256).Hash
            if ($manifest.files.$file -ne $hash) {
              Write-Host "Updated: $file"
              Write-Host "  Old: $($manifest.files.$file)"
              Write-Host "  New: $hash"
              $manifest.files.$file = $hash
              $changed = $true
            } else {
              Write-Host "OK: $file"
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing tracked file(s): $($missing -join ', ')"
            exit 1
          }
          if ($changed) {
            $manifest.generated = (Get-Date -Format 'yyyy-MM-dd')
            $manifest | ConvertTo-Json -Depth 5 | Set-Content 'config/hashes.json' -NoNewline
            Write-Host "`nHashes updated in config/hashes.json."
          } else {
            Write-Host "`nAll hashes already up to date."
          }

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/hashes.json
          if git diff --cached --quiet; then
            echo "No hash changes needed."
          else
            git commit -m "chore: regenerate config/hashes.json"
            git push || echo "Push failed — hashes will be regenerated on next run."
          fi

  build-web:
    name: Web UI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Editor tests
        run: npm test

      - name: Build
        run: npm run build

  test-e2e:
    name: Editor — Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  check-signing:
    name: Check Signing Availability
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if [ -n "$AZURE_TENANT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  sign-scripts:
    name: Code Signing — Azure Trusted Signing
    if: needs.check-signing.outputs.available == 'true'
    needs: [check-signing, lint-powershell, test-powershell, validate-modules, regenerate-hashes]
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install TrustedSigning module
        shell: pwsh
        run: |
          Install-Module -Name TrustedSigning -RequiredVersion 0.5.8 -Force -Scope CurrentUser -Repository PSGallery

      - name: Sign PowerShell scripts and modules
        shell: pwsh
        env:
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          $allScripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1' -Recurse |
            Where-Object { $_.FullName -notmatch '[/\\]tests[/\\]' }

          # Determine which scripts need signing (all on first push, only changed thereafter)
          if (-not $env:BEFORE_SHA -or $env:BEFORE_SHA -eq '0000000000000000000000000000000000000000') {
            Write-Host "Initial push — signing all $($allScripts.Count) production scripts."
            $scripts = $allScripts
          } else {
            $changedRaw = git diff --name-only $env:BEFORE_SHA HEAD -- '*.ps1' '*.psm1' 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Could not determine changed files — signing all $($allScripts.Count) scripts."
              $scripts = $allScripts
            } else {
              $changedPaths = @($changedRaw | Where-Object { $_ -and $_ -notmatch '[/\\]tests[/\\]' })
              if ($changedPaths.Count -eq 0) {
                Write-Host "No production scripts changed in this push — skipping signing."
                exit 0
              }
              $repoRoot = git rev-parse --show-toplevel 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Could not determine repo root — signing all $($allScripts.Count) scripts."
                $scripts = $allScripts
              } else {
                $changedFull = $changedPaths | ForEach-Object {
                  [System.IO.Path]::GetFullPath([System.IO.Path]::Combine($repoRoot, $_))
                }
                $changedSet = [System.Collections.Generic.HashSet[string]]::new(
                  [string[]]$changedFull,
                  [System.StringComparer]::OrdinalIgnoreCase
                )
                $scripts = @($allScripts | Where-Object { $changedSet.Contains($_.FullName) })
                if ($scripts.Count -eq 0) {
                  Write-Host "No matching production scripts found — skipping signing."
                  exit 0
                }
              }
            }
          }

          Write-Host "Signing $($scripts.Count) of $($allScripts.Count) production script(s)..."
          foreach ($file in $scripts) {
            Write-Host "Signing: $($file.FullName)"
            Invoke-TrustedSigning `
              -Endpoint $env:TRUSTED_SIGNING_ENDPOINT `
              -CodeSigningAccountName $env:TRUSTED_SIGNING_ACCOUNT `
              -CertificateProfileName $env:TRUSTED_SIGNING_PROFILE `
              -Files $file.FullName `
              -FileDigest SHA256 `
              -TimestampRfc3161 "http://timestamp.acs.microsoft.com" `
              -TimestampDigest SHA256

            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "Signature verification failed for $($file.FullName): $($sig.Status)"
              exit 1
            }
            Write-Host "  Signature valid ($($sig.SignerCertificate.Subject))"
          }
          Write-Host "`nAll $($scripts.Count) script(s) signed and verified successfully."

      - name: Regenerate hashes for signed files
        shell: pwsh
        run: |
          $manifest = Get-Content 'config/hashes.json' -Raw | ConvertFrom-Json
          foreach ($entry in $manifest.files.PSObject.Properties) {
            if (Test-Path $entry.Name) {
              $hash = (Get-FileHash -Path $entry.Name -Algorithm SHA256).Hash
              $manifest.files.($entry.Name) = $hash
            }
          }
          $manifest.generated = (Get-Date -Format 'yyyy-MM-dd')
          $manifest | ConvertTo-Json -Depth 5 | Set-Content 'config/hashes.json' -NoNewline
          Write-Host "Hashes regenerated for signed files."

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-scripts
          path: |
            src/scripts/
            src/modules/
            resources/autopilot/
            config/hashes.json
          retention-days: 7

      - name: Commit signed scripts to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/ src/modules/ resources/autopilot/ config/hashes.json
          if git diff --cached --quiet; then
            echo "No signing changes to commit."
          else
            git commit -m "chore: commit signed scripts and updated hashes"
            git fetch origin main
            git rebase -X theirs origin/main || {
              echo "::warning::Rebase failed — signed scripts must be committed manually."
              git rebase --abort
              exit 0
            }
            push_output=$(git push origin HEAD:refs/heads/main 2>&1) || echo "::warning::Push failed — signed scripts must be committed manually. Error: $push_output"
          fi
