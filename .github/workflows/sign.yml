name: Sign Scripts

on:
  workflow_dispatch:

concurrency:
  group: sign-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-signing:
    name: Check Signing Availability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if [ -n "$AZURE_TENANT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::error::Azure Trusted Signing secrets are not configured."
            exit 1
          fi

  sign-scripts:
    name: Code Signing — Azure Trusted Signing
    needs: check-signing
    if: needs.check-signing.outputs.available == 'true'
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install TrustedSigning module
        shell: pwsh
        run: |
          Install-Module -Name TrustedSigning -RequiredVersion 0.5.8 -Force -Scope CurrentUser -Repository PSGallery

      - name: Sign PowerShell scripts and modules
        shell: pwsh
        env:
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $scripts = Get-ChildItem -Path . -Include '*.ps1','*.psm1','*.psd1' -Recurse |
            Where-Object { $_.FullName -notmatch '[/\\](tests|\.github)[/\\]' }

          Write-Host "Found $($scripts.Count) production script(s). Checking signatures..."
          $signed = 0
          $skipped = 0
          foreach ($file in $scripts) {
            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -eq 'Valid') {
              Write-Host "Skipping (already signed): $($file.FullName)"
              $skipped++
              continue
            }

            Write-Host "Signing: $($file.FullName) (status: $($sig.Status))"

            # Strip existing signature block before re-signing to prevent
            # Invoke-TrustedSigning bug that corrupts the last byte of file content
            $lines = Get-Content -LiteralPath $file.FullName
            $sigLine = $lines | Select-String -Pattern '^# SIG # Begin signature block$' | Select-Object -First 1
            if ($sigLine) {
              $contentLines = $lines[0..($sigLine.LineNumber - 2)]
              while ($contentLines.Count -gt 0 -and $contentLines[-1].Trim() -eq '') {
                $contentLines = $contentLines[0..($contentLines.Count - 2)]
              }
              $rawBytes = [System.IO.File]::ReadAllBytes($file.FullName)
              $hasBom = $rawBytes.Length -ge 3 -and $rawBytes[0] -eq 0xEF -and $rawBytes[1] -eq 0xBB -and $rawBytes[2] -eq 0xBF
              $enc = if ($hasBom) { [System.Text.UTF8Encoding]::new($true) } else { [System.Text.UTF8Encoding]::new($false) }
              [System.IO.File]::WriteAllText($file.FullName, (($contentLines -join "`n") + "`n"), $enc)
              Write-Host "  Stripped old signature from: $($file.Name)"
            }

            Invoke-TrustedSigning `
              -Endpoint $env:TRUSTED_SIGNING_ENDPOINT `
              -CodeSigningAccountName $env:TRUSTED_SIGNING_ACCOUNT `
              -CertificateProfileName $env:TRUSTED_SIGNING_PROFILE `
              -Files $file.FullName `
              -FileDigest SHA256 `
              -TimestampRfc3161 "http://timestamp.acs.microsoft.com" `
              -TimestampDigest SHA256

            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne 'Valid') {
              Write-Error "Signature verification failed for $($file.FullName): $($sig.Status)"
              exit 1
            }
            Write-Host "  Signature valid ($($sig.SignerCertificate.Subject))"
            $signed++
          }
          Write-Host "`nDone. Signed: $signed, Skipped (already valid): $skipped, Total: $($scripts.Count)"

      - name: Regenerate hashes for signed files
        shell: pwsh
        run: .github/scripts/Regenerate-Hashes.ps1 -Force

      - name: Validate hashes after signing
        shell: pwsh
        run: .github/scripts/Validate-Hashes.ps1

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-scripts
          path: |
            src/scripts/
            src/modules/
            resources/autopilot/
            config/hashes.json
          retention-days: 7

      - name: Commit signed scripts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/ src/modules/ resources/autopilot/ config/hashes.json
          if git diff --cached --quiet; then
            echo "No signing changes to commit."
          else
            git commit -m "chore: commit signed scripts and updated hashes"
            # Save the signing commit SHA before any rebase attempts
            signing_sha=$(git rev-parse HEAD)
            max_attempts=3
            for attempt in $(seq 1 $max_attempts); do
              git fetch origin "${{ github.ref_name }}"
              git rebase -X theirs "origin/${{ github.ref_name }}" || {
                echo "::warning::Rebase failed on attempt $attempt/$max_attempts"
                git rebase --abort 2>/dev/null || true
                if [ "$attempt" -eq "$max_attempts" ]; then
                  echo "::error::All $max_attempts rebase attempts failed -- signed scripts must be committed manually."
                  exit 1
                fi
                sleep $((attempt * 5))
                # Restore the original signing commit for next attempt
                git checkout "$signing_sha" 2>/dev/null || true
                continue
              }
              if git push origin "HEAD:${{ github.ref }}" 2>&1; then
                echo "Push succeeded on attempt $attempt."
                break
              else
                echo "::warning::Push failed on attempt $attempt/$max_attempts"
                if [ "$attempt" -eq "$max_attempts" ]; then
                  echo "::error::All $max_attempts push attempts failed -- signed scripts must be committed manually."
                  exit 1
                fi
                sleep $((attempt * 5))
                # Restore the original signing commit for next attempt
                git checkout "$signing_sha" 2>/dev/null || true
              fi
            done
          fi
