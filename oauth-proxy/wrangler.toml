# AmpCloud GitHub OAuth CORS Proxy — Cloudflare Worker configuration
#
# Deploy with:
#   cd oauth-proxy
#   npm install
#   npm run deploy
#
# After deploying, configure secrets (see README.md for details):
#   wrangler secret put GITHUB_APP_ID
#   wrangler secret put GITHUB_APP_PRIVATE_KEY
#   wrangler secret put GITHUB_APP_INSTALLATION_ID

name = "ampcloud-oauth-proxy"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
account_id = "deb57b55201f0395f39a3f5ea1df09e3"

[observability]
enabled = true

[observability.logs]
enabled = true

# Optional: uncomment to lock the proxy to a single browser origin.
# You can also set this in the Cloudflare dashboard under
# Settings → Variables & Secrets instead of hard-coding it here.
#
# [vars]
# ALLOWED_ORIGIN = "https://<you>.github.io"
