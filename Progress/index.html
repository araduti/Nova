<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmpCloud</title>
    <style>
        /* ── Reset & base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-top:       #dae8fc;
            --bg-bottom:    #eaf0fa;
            --bg-dark-top:  #1a1a2e;
            --bg-dark-bot:  #16213e;
            --card:         #ffffff;
            --card-dark:    rgba(22, 33, 62, 0.92);
            --card-shadow:  rgba(0, 0, 0, 0.08);
            --accent:       #0f7ae5;
            --accent-glow:  rgba(15, 122, 229, 0.25);
            --text:         #1a1a2e;
            --text-dark:    #e0e0e0;
            --text-muted:   #7b8da6;
            --border:       #2a3a5c;
            --success:      #107c10;
            --illust-blue:  #0078d4;
            --illust-violet:#7b2ff7;
            --radius:       16px;
            --font:         'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            overflow: hidden;
            user-select: none;
        }

        /* ── Gradient backdrop ─────────────────────────────────────── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.4s ease;
        }
        .backdrop.dark {
            background: linear-gradient(180deg, var(--bg-dark-top) 0%, var(--bg-dark-bot) 100%);
        }

        /* ── Card ──────────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 48px 52px 40px;
            width: 520px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 8px 40px var(--card-shadow), 0 0 0 1px rgba(0,0,0,0.04);
            position: relative;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        .dark .card {
            background: var(--card-dark);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        /* ── Logo ──────────────────────────────────────────────────── */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 32px;
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent) 0%, #5c7cfa 100%);
            border-radius: 8px;
            font-size: 18px;
            color: #fff;
        }

        /* ── Illustration — three overlapping circles ──────────────── */
        .illustration {
            position: relative;
            height: 90px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            position: relative;
        }
        .circle-left {
            background: var(--illust-blue);
            z-index: 1;
            margin-right: -12px;
        }
        .circle-center {
            background: #ffffff;
            border: 2px solid var(--illust-blue);
            color: var(--illust-blue);
            z-index: 2;
            width: 72px;
            height: 72px;
            font-size: 28px;
        }
        .circle-right {
            background: var(--illust-violet);
            z-index: 1;
            margin-left: -12px;
        }

        /* ── Spinner ring ──────────────────────────────────────────── */
        .spinner-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(15, 122, 229, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner.done {
            animation: none;
            border-color: var(--success);
            border-top-color: var(--success);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Step indicators ───────────────────────────────────────── */
        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-bottom: 28px;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .dark .step-dot { background: #3a3a4e; }
        .step.active .step-dot {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .step.completed .step-dot {
            background: var(--success);
        }
        .step-label {
            font-size: 11px;
            color: #999;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .step.active .step-label { color: var(--accent); font-weight: 600; }
        .step.completed .step-label { color: var(--success); }
        .dark .step-label { color: var(--text-muted); }
        .dark .step.active .step-label { color: var(--accent); }
        .dark .step.completed .step-label { color: var(--success); }
        .step-line {
            width: 32px;
            height: 2px;
            background: #ddd;
            margin: 0 4px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }
        .dark .step-line { background: #2a3a5c; }
        .step-line.completed { background: var(--success); }

        /* ── Status message ────────────────────────────────────────── */
        .status {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            min-height: 24px;
            transition: color 0.3s ease;
        }
        .dark .status { color: var(--text-dark); }

        /* ── Progress bar ──────────────────────────────────────────── */
        .progress-container {
            margin-top: 16px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .dark .progress-bar { background: rgba(255, 255, 255, 0.08); }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #5c7cfa);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ── Detail text ───────────────────────────────────────────── */
        .detail {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            min-height: 18px;
        }

        /* ── Bottom labels ─────────────────────────────────────────── */
        .brand, .hint {
            position: fixed;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.25);
            transition: color 0.4s ease;
        }
        .dark .brand, .dark .hint { color: rgba(255, 255, 255, 0.15); }
        .brand { bottom: 12px; right: 16px; }
        .hint  { bottom: 12px; left: 16px; }

        /* ── Fade-in ───────────────────────────────────────────────── */
        body { opacity: 0; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="backdrop dark" id="backdrop">
        <div class="card">
            <!-- Logo -->
            <div class="logo">
                <span class="logo-icon">&#9729;</span>
                <span>AmpCloud</span>
            </div>

            <!-- Illustration — three overlapping icon circles -->
            <div class="illustration">
                <div class="circle circle-left">&#127760;</div>
                <div class="circle circle-center">&#9729;</div>
                <div class="circle circle-right">&#11015;&#65039;</div>
            </div>

            <!-- Spinner -->
            <div class="spinner-wrap">
                <div class="spinner" id="spinner"></div>
            </div>

            <!-- Step indicators -->
            <div class="steps" id="steps">
                <div class="step active" data-step="1">
                    <span class="step-dot"></span>
                    <span class="step-label">Network</span>
                </div>
                <div class="step-line" id="line1"></div>
                <div class="step" data-step="2">
                    <span class="step-dot"></span>
                    <span class="step-label">Connect</span>
                </div>
                <div class="step-line" id="line2"></div>
                <div class="step" data-step="3">
                    <span class="step-dot"></span>
                    <span class="step-label">Sign in</span>
                </div>
                <div class="step-line" id="line3"></div>
                <div class="step" data-step="4">
                    <span class="step-dot"></span>
                    <span class="step-label">Deploy</span>
                </div>
            </div>

            <!-- Status message -->
            <div class="status" id="status">Initialising network stack&#8230;</div>

            <!-- Progress bar (hidden until progress > 0) -->
            <div class="progress-container" id="progressContainer" style="display:none">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText"></div>
            </div>

            <!-- Detail text -->
            <div class="detail" id="detail"></div>
        </div>
    </div>

    <span class="brand">AmpCloud &bull; Cloud Imaging Engine</span>
    <span class="hint">Press F8 for command prompt</span>

    <script>
        /* ── HTML Progress Dashboard ──────────────────────────────────
         *  Polls X:\AmpCloud-Status.json (written by Bootstrap.ps1 and
         *  AmpCloud.ps1) and updates the on-screen progress display.
         *  Runs inside Edge in --app / --kiosk mode on WinPE.
         * ──────────────────────────────────────────────────────────── */

        var STATUS_PATH = 'file:///X:/AmpCloud-Status.json';
        var POLL_MS     = 650;
        var lastStep    = 0;

        var elStatus    = document.getElementById('status');
        var elDetail    = document.getElementById('detail');
        var elProgress  = document.getElementById('progressContainer');
        var elFill      = document.getElementById('progressFill');
        var elText      = document.getElementById('progressText');
        var elSpinner   = document.getElementById('spinner');
        var steps       = document.querySelectorAll('#steps .step');
        var lines       = [document.getElementById('line1'),
                           document.getElementById('line2'),
                           document.getElementById('line3')];

        function updateUI(data) {
            if (!data) return;

            /* Status message */
            if (data.Message) {
                elStatus.textContent = data.Message;
            }

            /* Step indicator (1-4) */
            if (data.Step > 0 && data.Step !== lastStep) {
                lastStep = data.Step;
                steps.forEach(function (s, i) {
                    var n = i + 1;
                    s.classList.remove('active', 'completed');
                    if (n < data.Step)      s.classList.add('completed');
                    else if (n === data.Step) s.classList.add('active');
                });
                lines.forEach(function (l, i) {
                    if (i < data.Step - 1) l.classList.add('completed');
                    else                   l.classList.remove('completed');
                });
            }

            /* Progress bar */
            if (data.Progress > 0) {
                elProgress.style.display = 'block';
                elFill.style.width = Math.min(data.Progress, 100) + '%';
                var detail = data.Detail || data.Message || '';
                elText.textContent = detail + '  \u2022  ' + data.Progress + '%';
            } else {
                elProgress.style.display = 'none';
            }

            /* Detail line (shown below status when no progress bar) */
            if (data.Detail && data.Progress <= 0) {
                elDetail.textContent = data.Detail;
            } else if (!data.Detail) {
                elDetail.textContent = '';
            }

            /* Done flag */
            if (data.Done) {
                elSpinner.classList.add('done');
            }
        }

        /* Poll the status JSON written by PowerShell scripts */
        function pollStatus() {
            var xhr = new XMLHttpRequest();
            xhr.onload = function () {
                try {
                    if (xhr.responseText && xhr.responseText.trim()) {
                        var data = JSON.parse(xhr.responseText);
                        updateUI(data);
                    }
                } catch (e) { /* parse error — ignore */ }
            };
            /* onerror is expected when the file does not yet exist */
            xhr.onerror = function () {};
            try {
                xhr.open('GET', STATUS_PATH, true);
                xhr.send();
            } catch (e) { /* ignore */ }
        }

        setInterval(pollStatus, POLL_MS);
    </script>
</body>
</html>
